# Upptime configuration for status.rustunnel.com.
#
# Copy this file verbatim into the public `joaoh82/rustunnel-status` repo
# (created from the upptime/upptime template) and push to `master`. The
# `Uptime CI` GitHub Action runs every 5 minutes and commits results to
# the `status` branch, which Vercel deploys to status.rustunnel.com.
#
# See rustunnel-private/docs/deployment/status-page-setup.md for the full
# bootstrap runbook (DNS, Vercel, Postgres token seed).

owner: joaoh82
repo: rustunnel-status

# Run all checks every 5 minutes (free GitHub Actions tier limit).
# Higher resolution would require a paid runner or self-hosted runners.
sites:
  - name: Marketing site
    url: https://rustunnel.com
    expectedStatusCodes:
      - 200

  - name: Platform API
    url: https://api.rustunnel.com/health
    expectedStatusCodes:
      - 200

  - name: Platform API — Database
    url: https://api.rustunnel.com/health/db
    expectedStatusCodes:
      - 200

  - name: EU edge — control plane
    url: https://eu.edge.rustunnel.com:8443/api/status
    expectedStatusCodes:
      - 200

  - name: US edge — control plane
    url: https://us.edge.rustunnel.com:8443/api/status
    expectedStatusCodes:
      - 200

  - name: AP edge — control plane
    url: https://ap.edge.rustunnel.com:8443/api/status
    expectedStatusCodes:
      - 200

  - name: EU edge — synthetic tunnel
    url: https://synthetic-eu.rustunnel.com
    expectedStatusCodes:
      - 200

  - name: US edge — synthetic tunnel
    url: https://synthetic-us.rustunnel.com
    expectedStatusCodes:
      - 200

  - name: AP edge — synthetic tunnel
    url: https://synthetic-ap.rustunnel.com
    expectedStatusCodes:
      - 200

# GitHub assignees auto-added to incident issues.
assignees:
  - joaoh82

# Notifications wired in Phase 2 (RSS / email subscribe). Empty for v1.
notifications: []

# Status website (Next.js) settings.
status-website:
  cname: status.rustunnel.com
  name: rustunnel status
  introTitle: "**rustunnel** uptime, region by region."
  introMessage: >-
    Real-time status for rustunnel.com, the platform API, and the
    EU/US/AP edge regions. Subscribe to incidents via the GitHub repo
    or RSS (coming soon).
  logoUrl: https://rustunnel.com/rustunnel-logo.png
  navbar:
    - title: Status
      href: /
    - title: rustunnel.com
      href: https://rustunnel.com
    - title: Docs
      href: https://rustunnel.com/docs
  theme: dark

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational
  incidentReport: "Incident report:"
  scheduledMaintenance: Scheduled maintenance
  upLabel: Up
  downLabel: Down
  degradedLabel: Degraded
  unknownLabel: Unknown
  pastIncidents: Past incidents
  resolved: Resolved

# Workflow tuning — sane defaults that don't blow the GitHub Actions
# minute budget on a free account.
workflowSchedule:
  graphs: "0 0 * * *"      # daily uptime graphs
  responseTime: "0 23 * * *"  # daily response-time chart
  staticSite: "0 1 * * *"    # daily static-site rebuild
  summary: "0 0 * * *"       # daily README summary
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"      # check every 5 min
